<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f5f7;font-family:'Montserrat',sans-serif;font-size:14px;color:#1a1a1a;min-height:100vh;padding:24px}
.wrap{max-width:860px;margin:0 auto}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.top h1{font-size:18px;font-weight:700}
.meta{font-size:11px;color:#888;margin-top:2px;font-weight:400}
.tbl-wrap{background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse}
thead th{background:#1d2d50;color:#fff;font-size:11px;font-weight:600;padding:12px 20px;text-align:right;letter-spacing:0}
thead th:first-child{text-align:left}
thead th.th-unit{color:#a0b4cc;font-weight:400;font-size:10px;text-align:right}
.sec-hdr td{background:#dbeafe;color:#1d4ed8;font-size:11px;font-weight:700;padding:8px 20px;letter-spacing:.06em;text-transform:uppercase;border-top:1px solid #bfdbfe;border-bottom:1px solid #bfdbfe}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:#f9fafb}
tbody tr:nth-child(odd){background:#fff}
tbody tr.sec-hdr:nth-child(odd),tbody tr.sec-hdr:nth-child(even){background:transparent}
tbody tr:hover:not(.sec-hdr){background:#f0f4ff}
tbody td{padding:11px 20px;font-size:13px;color:#1a1a1a;font-weight:400}
tbody td:first-child{font-weight:500}
tbody td.unit{text-align:right;font-size:12px;color:#1a1a1a}
tbody td.num{text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:#1a1a1a}
tbody td.pos{text-align:right;font-weight:600;color:#16a34a;font-variant-numeric:tabular-nums}
tbody td.neg{text-align:right;font-weight:600;color:#dc2626;font-variant-numeric:tabular-nums}
tbody td.neu{text-align:right;font-weight:600;color:#888;font-variant-numeric:tabular-nums}
tbody td.b-up{text-align:right;font-weight:600;color:#dc2626;font-variant-numeric:tabular-nums}
tbody td.b-dn{text-align:right;font-weight:600;color:#16a34a;font-variant-numeric:tabular-nums}
tbody td.b-neu{text-align:right;font-weight:600;color:#888;font-variant-numeric:tabular-nums}
.ts{font-size:11px;color:#aaa;text-align:right;margin-top:10px}
.err{text-align:center;padding:40px;color:#888;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Market Overview</h1>
      <div class="meta" id="meta">Loading…</div>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:32%">Instrument</th>
          <th class="th-unit">Unit</th>
          <th>Last Close</th>
          <th>1 Day</th>
          <th>YTD</th>
        </tr>
      </thead>
      <tbody id="body"></tbody>
    </table>
  </div>
  <div class="ts" id="ts"></div>
</div>
<script>
function cls(sign, isBond) {
  if (sign === 0) return isBond ? "b-neu" : "neu";
  if (isBond) return sign > 0 ? "b-up" : "b-dn";
  return sign > 0 ? "pos" : "neg";
}

function render(data) {
  const body = document.getElementById("body");
  let html = "";
  data.sections.forEach(sec => {
    html += `<tr class="sec-hdr"><td class="sec-hdr" colspan="5">${sec.label}</td></tr>`;
    sec.rows.forEach((r, i) => {
      const bg = i % 2 === 0 ? "#fff" : "#f9fafb";
      const dc = cls(r.dSign, r.isBond);
      const yc = cls(r.ySign, r.isBond);
      html += `<tr style="background:${bg}">
        <td>${r.name}</td>
        <td class="unit">${r.unit || ""}</td>
        <td class="num">${r.close}</td>
        <td class="${dc}">${r.daily}</td>
        <td class="${yc}">${r.ytd}</td>
      </tr>`;
    });
  });
  body.innerHTML = html;
  document.getElementById("meta").textContent = `Previous close · ${data.asOf}`;
  document.getElementById("ts").textContent = `Auto-updated daily at 7am Dubai time · Last run: ${data.updatedAt}`;
}

fetch(`data.json?v=${Date.now()}`)
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e => {
    document.getElementById("body").innerHTML = `<tr><td colspan="5" class="err">Could not load data.json — run the GitHub Action first.<br><small>${e}</small></td></tr>`;
    document.getElementById("meta").textContent = "Data unavailable";
  });
</script>
</body>
</html>
